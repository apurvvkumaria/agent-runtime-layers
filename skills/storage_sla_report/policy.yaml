# Skill-level capability policy for storage_sla_report (DEPRECATED).
#
# Inherits the replacement's shape — filesystem-only, no network — since it just
# delegates to storage_health_check. A capability manifest, not the runtime
# OpenShell sandbox policy (see openshell/policy.yaml).
network:
  egress: []
filesystem:
  readable: [docs/]
  writable: [/sandbox/output]
resources:
  cpu_cores: 1
  memory_mb: 512
  timeout_seconds: 15
